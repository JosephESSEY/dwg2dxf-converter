name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build WASM & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository (including Submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Emscripten (emsdk)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.53

      - name: Install System Dependencies (CMake)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Node Dependencies
        run: npm install

      - name: Rebuild LibreDWG WebAssembly
        run: npm run build

      - name: Run Automated Tests
        run: npm test

      - name: Verify WASM Build Integrity
        run: |
          if [ ! -f "wasm/libredwg.wasm" ]; then
            echo "Error: libredwg.wasm was not compiled successfully!"
            exit 1
          fi

      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
